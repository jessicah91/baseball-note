<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>덕아웃 노트</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero card">
        <div class="eyebrow">BASEBALL DIARY</div>
        <h1>덕아웃 노트</h1>
        <p class="hero-copy">욕으로 흘려보내지 말고, 오늘 본 경기를 기록으로 남겨봐. 지금은 순위판부터 안정적으로 다시 세팅했어.</p>
        <div class="toolbar">
          <label class="team-picker">
            <span>마이팀</span>
            <select id="teamSelect"></select>
          </label>
          <button id="refreshBtn" class="button secondary">순위 새로고침</button>
        </div>
      </header>

      <main class="grid">
        <section class="card standings-card">
          <div class="section-head">
            <div>
              <div class="section-kicker">KBO TEAM RANK</div>
              <h2>마이팀 순위</h2>
            </div>
            <span id="updatedAt" class="muted"></span>
          </div>
          <div id="myStandingCard" class="my-standing empty">불러오는 중...</div>
          <details class="standings-fold" open>
            <summary>전체 순위 보기</summary>
            <div id="standingsTable" class="standings-table"></div>
          </details>
        </section>

        <section class="card diary-card">
          <div class="section-head">
            <div>
              <div class="section-kicker">TODAY'S ENTRY</div>
              <h2>오늘의 기록</h2>
            </div>
          </div>

          <div class="entry-topline">
            <input id="entryTitle" type="text" placeholder="예: 9회말이 너무 아쉬웠던 경기" />
          </div>

          <textarea id="entryText" placeholder="오늘 경기에서 답답했던 장면, 좋았던 장면, 이해 안 됐던 운영을 편하게 써봐."></textarea>

          <div class="entry-actions">
            <button id="softenBtn" class="button primary">GPT로 순화하기</button>
            <button id="previewBtn" class="button secondary">미리보기 만들기</button>
          </div>

          <div class="preview-wrap">
            <div class="preview-label">정리된 기록</div>
            <div id="previewBox" class="preview-box">여기에 자연스러운 회고문이 정리돼.</div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
