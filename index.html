<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dugout Note</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="app">

  <header class="header">
    <h1>덕아웃 노트</h1>
    <button id="modeToggle">🌙</button>
  </header>

  <section class="team-card">
    <label>마이팀</label>
    <select id="teamSelect">
      <option>롯데</option>
      <option>LG</option>
      <option>삼성</option>
    </select>
  </section>

  <section class="diary">
    <h2>오늘의 기록</h2>
    <textarea id="input" placeholder="오늘 경기 어땠어?"></textarea>
    <button id="soften">순화하기</button>
    <div id="result"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
