<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dugout Note</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header card">
      <div>
        <p class="eyebrow">BASEBALL DIARY</p>
        <h1>덕아웃 노트</h1>
      </div>
      <button id="modeToggle" class="icon-btn" aria-label="모드 전환">🌙</button>
    </header>

    <section class="team-card card">
      <div class="section-head">
        <div>
          <p class="eyebrow">MY TEAM</p>
          <h2>마이팀 설정</h2>
        </div>
        <div class="chip" id="teamColorChip">롯데</div>
      </div>

      <label for="teamSelect" class="label">응원 구단</label>
      <select id="teamSelect" class="select">
        <option value="KIA">KIA 타이거즈</option>
        <option value="SAMSUNG">삼성 라이온즈</option>
        <option value="LG">LG 트윈스</option>
        <option value="DOOSAN">두산 베어스</option>
        <option value="KT">KT 위즈</option>
        <option value="SSG">SSG 랜더스</option>
        <option value="LOTTE" selected>롯데 자이언츠</option>
        <option value="HANWHA">한화 이글스</option>
        <option value="NC">NC 다이노스</option>
        <option value="KIWOOM">키움 히어로즈</option>
      </select>
    </section>

    <section class="diary card">
      <div class="section-head">
        <div>
          <p class="eyebrow">TODAY'S NOTE</p>
          <h2>오늘의 기록</h2>
        </div>
        <button id="toggleDiary" class="soft-btn" type="button">접기</button>
      </div>

      <div id="diaryBody">
        <p class="helper">욕이 섞여도 먼저 적고, 아래에서 순화해봐.</p>
        <textarea id="input" placeholder="예) 오늘 경기 진짜 답답했는데 8회 수비는 좋았다..."></textarea>

        <div class="button-row">
          <button id="soften" class="primary-btn">순화하기</button>
          <button id="clearBtn" class="soft-btn" type="button">지우기</button>
        </div>

        <div class="result-wrap">
          <p class="label">정리된 문장</p>
          <div id="result" class="result-box">여기에 순화된 문장이 보여.</div>
        </div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
